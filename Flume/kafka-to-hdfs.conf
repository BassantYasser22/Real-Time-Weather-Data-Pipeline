agent.sources = src
agent.channels = ch
agent.sinks = sink

agent.sources.src.type = org.apache.flume.source.kafka.KafkaSource
agent.sources.src.kafka.bootstrap.servers = localhost:9092
agent.sources.src.kafka.topics = weather_topic
agent.sources.src.kafka.consumer.group.id = weather_flume_group

agent.channels.ch.type = memory
agent.channels.ch.capacity = 1000
agent.channels.ch.transactionCapacity = 100

agent.sinks.sink.type = hdfs
agent.sinks.sink.hdfs.path = /weather_data
agent.sinks.sink.hdfs.fileType = DataStream
agent.sinks.sink.hdfs.writeFormat = Text
agent.sinks.sink.hdfs.rollInterval = 30
agent.sinks.sink.hdfs.rollSize = 0
agent.sinks.sink.hdfs.rollCount = 10

agent.sources.src.channels = ch
agent.sinks.sink.channel = ch
